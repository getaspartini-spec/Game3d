<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petualang 3D - Game Simulasi Karakter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            pointer-events: none;
            z-index: 100;
            border-left: 5px solid #ff6b6b;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        
        #info h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
            color: #ff6b6b;
        }
        
        #info p {
            margin: 5px 0;
            font-size: 14px;
            opacity: 0.9;
        }
        
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            z-index: 100;
            display: flex;
            gap: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        
        .control-key {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 8px 15px;
            font-weight: bold;
            color: #ff6b6b;
            margin: 0 5px;
        }
        
        #stats {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            min-width: 150px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }
        
        .stat-value {
            color: #ff6b6b;
            font-weight: bold;
        }
        
        #instructions {
            position: absolute;
            bottom: 100px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            backdrop-filter: blur(3px);
        }
        
        #mobile-controls {
            position: absolute;
            bottom: 120px;
            right: 20px;
            display: none;
            grid-template-columns: repeat(3, 70px);
            gap: 10px;
            z-index: 200;
        }
        
        .mobile-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            color: white;
            font-size: 30px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
        }
        
        .mobile-btn:active {
            background: rgba(255, 107, 107, 0.5);
            transform: scale(0.95);
            border-color: #ff6b6b;
        }
        
        @media (max-width: 768px) {
            #mobile-controls {
                display: grid;
            }
            #controls {
                display: none;
            }
            #info h1 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>🌍 PETUALANG 3D</h1>
        <p>Game Simulasi Karakter dengan Kontrol 3D</p>
    </div>
    
    <div id="stats">
        <div class="stat-item">
            <span>📍 Posisi X:</span>
            <span class="stat-value" id="pos-x">0</span>
        </div>
        <div class="stat-item">
            <span>📍 Posisi Y:</span>
            <span class="stat-value" id="pos-y">0</span>
        </div>
        <div class="stat-item">
            <span>📍 Posisi Z:</span>
            <span class="stat-value" id="pos-z">0</span>
        </div>
        <div class="stat-item">
            <span>⚡ Kecepatan:</span>
            <span class="stat-value" id="speed">5</span>
        </div>
        <div class="stat-item">
            <span>🎯 Mode Kamera:</span>
            <span class="stat-value" id="cam-mode">Third Person</span>
        </div>
    </div>
    
    <div id="controls">
        <span><span class="control-key">WASD</span> Gerak</span>
        <span><span class="control-key">Space</span> Lompat</span>
        <span><span class="control-key">C</span> Ganti Kamera</span>
        <span><span class="control-key">Shift</span> Lari</span>
    </div>
    
    <div id="instructions">
        👆 Klik layar untuk mulai • Mouse gerakkan kamera • Koleksi objek emas!
    </div>
    
    <div id="mobile-controls">
        <div></div>
        <div class="mobile-btn" id="mobile-up">⬆️</div>
        <div></div>
        <div class="mobile-btn" id="mobile-left">⬅️</div>
        <div class="mobile-btn" id="mobile-down">⬇️</div>
        <div class="mobile-btn" id="mobile-right">➡️</div>
        <div></div>
        <div class="mobile-btn" id="mobile-jump">🦘</div>
        <div></div>
    </div>

    <!-- Import Three.js dari CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
        
        // --- INISIALISASI SCENE, CAMERA, RENDERER ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        
        // Fog untuk efek kedalaman
        scene.fog = new THREE.Fog(0x87CEEB, 20, 50);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // --- KONTROL ORBIT UNTUK KAMERA (Third Person) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = true;
        controls.maxPolarAngle = Math.PI / 2.2; // Batasi bawah kamera
        controls.minDistance = 5;
        controls.maxDistance = 20;
        controls.target.set(0, 2, 0);
        
        // --- PENCAHAYAAN ---
        // Ambient light
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Directional light (matahari)
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 30;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 50;
        scene.add(dirLight);
        
        // Back light
        const backLight = new THREE.PointLight(0x4466cc, 0.5);
        backLight.position.set(-5, 5, -10);
        scene.add(backLight);
        
        // --- LANTAI (GROUND) ---
        const groundGeometry = new THREE.CircleGeometry(50, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x3a7e3a,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Grid helper untuk efek visual
        const gridHelper = new THREE.GridHelper(100, 20, 0xffffff, 0xaaaaaa);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);
        
        // --- MEMBUAT KARAKTER SEDERHANA ---
        const character = new THREE.Group();
        
        // Body (kapsul sederhana)
        const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.5, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff6b6b, emissive: 0x331100 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.75;
        body.castShadow = true;
        body.receiveShadow = true;
        character.add(body);
        
        // Head
        const headGeo = new THREE.SphereGeometry(0.4, 16, 16);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 1.75;
        head.castShadow = true;
        head.receiveShadow = true;
        character.add(head);
        
        // Eyes
        const eyeGeo = new THREE.SphereGeometry(0.1, 8, 8);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        
        const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
        eyeL.position.set(-0.15, 1.85, 0.35);
        character.add(eyeL);
        
        const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
        eyeR.position.set(0.15, 1.85, 0.35);
        character.add(eyeR);
        
        // Hat
        const hatGeo = new THREE.ConeGeometry(0.35, 0.3, 8);
        const hatMat = new THREE.MeshStandardMaterial({ color: 0x44aa88 });
        const hat = new THREE.Mesh(hatGeo, hatMat);
        hat.position.y = 2.1;
        hat.rotation.x = 0;
        hat.castShadow = true;
        character.add(hat);
        
        // Arms
        const armGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.8);
        const armMat = new THREE.MeshStandardMaterial({ color: 0xff6b6b });
        
        // Left arm
        const armL = new THREE.Mesh(armGeo, armMat);
        armL.position.set(-0.65, 1.2, 0);
        armL.rotation.z = 0.3;
        armL.castShadow = true;
        character.add(armL);
        
        // Right arm
        const armR = new THREE.Mesh(armGeo, armMat);
        armR.position.set(0.65, 1.2, 0);
        armR.rotation.z = -0.3;
        armR.castShadow = true;
        character.add(armR);
        
        // Legs
        const legGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.8);
        const legMat = new THREE.MeshStandardMaterial({ color: 0xaa5533 });
        
        // Left leg
        const legL = new THREE.Mesh(legGeo, legMat);
        legL.position.set(-0.3, 0.4, 0);
        legL.castShadow = true;
        character.add(legL);
        
        // Right leg
        const legR = new THREE.Mesh(legGeo, legMat);
        legR.position.set(0.3, 0.4, 0);
        legR.castShadow = true;
        character.add(legR);
        
        character.position.set(0, 0.8, 0);
        character.castShadow = true;
        character.receiveShadow = true;
        scene.add(character);
        
        // --- OBJEK DEKORASI DAN KOLEKSI ---
        const collectibles = [];
        
        // Membuat beberapa pohon sederhana
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            
            // Batang
            const trunkGeo = new THREE.CylinderGeometry(0.3, 0.4, 2);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 1;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            treeGroup.add(trunk);
            
            // Daun
            const leafGeo = new THREE.ConeGeometry(0.8, 1.5, 8);
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2e8b57 });
            const leaf = new THREE.Mesh(leafGeo, leafMat);
            leaf.position.y = 2;
            leaf.castShadow = true;
            leaf.receiveShadow = true;
            treeGroup.add(leaf);
            
            treeGroup.position.set(x, 1, z);
            return treeGroup;
        }
        
        // Tambahkan pohon di sekitar
        scene.add(createTree(5, 5));
        scene.add(createTree(-5, 5));
        scene.add(createTree(5, -5));
        scene.add(createTree(-5, -5));
        scene.add(createTree(8, -8));
        scene.add(createTree(-8, 8));
        
        // Membuat batu-batu
        for (let i = 0; i < 10; i++) {
            const rockGeo = new THREE.DodecahedronGeometry(0.3 + Math.random() * 0.3);
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
            const rock = new THREE.Mesh(rockGeo, rockMat);
            rock.position.set(
                (Math.random() - 0.5) * 30,
                0.3,
                (Math.random() - 0.5) * 30
            );
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
        }
        
        // Membuat objek koleksi (berbentuk bintang/kubus emas)
        for (let i = 0; i < 15; i++) {
            const coinGeo = new THREE.TorusGeometry(0.3, 0.1, 8, 20, Math.PI);
            const coinMat = new THREE.MeshStandardMaterial({ 
                color: 0xffd700,
                emissive: 0x442200,
                roughness: 0.3,
                metalness: 0.8
            });
            const coin = new THREE.Mesh(coinGeo, coinMat);
            coin.position.set(
                (Math.random() - 0.5) * 25,
                0.5,
                (Math.random() - 0.5) * 25
            );
            coin.rotation.x = Math.PI / 2;
            coin.rotation.z = Math.random() * Math.PI;
            coin.castShadow = true;
            coin.receiveShadow = true;
            
            // Tambahkan properti untuk animasi
            coin.userData = {
                type: 'collectible',
                rotationSpeed: 0.02,
                floatSpeed: 0.01 + Math.random() * 0.02,
                floatOffset: Math.random() * Math.PI * 2
            };
            
            scene.add(coin);
            collectibles.push(coin);
        }
        
        // Tambahkan beberapa kubus berwarna
        const colors = [0xff3333, 0x33ff33, 0x3333ff, 0xffff33, 0xff33ff];
        for (let i = 0; i < 8; i++) {
            const boxGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const boxMat = new THREE.MeshStandardMaterial({ color: colors[i % colors.length], emissive: 0x111111 });
            const box = new THREE.Mesh(boxGeo, boxMat);
            box.position.set(
                (Math.random() - 0.5) * 20,
                0.25,
                (Math.random() - 0.5) * 20
            );
            box.castShadow = true;
            box.receiveShadow = true;
            scene.add(box);
        }
        
        // --- VARIABEL KONTROL KARAKTER ---
        const keyState = {
            w: false,
            a: false,
            s: false,
            d: false,
            space: false,
            shift: false
        };
        
        let moveSpeed = 0.15;
        const walkSpeed = 0.15;
        const runSpeed = 0.3;
        let velocityY = 0;
        let isJumping = false;
        const gravity = 0.01;
        const jumpPower = 0.25;
        let characterHeight = 0.8;
        
        let cameraMode = 'third'; // 'third' atau 'orbit'
        let collectedCount = 0;
        
        // --- EVENT LISTENERS UNTUK KEYBOARD ---
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = true; e.preventDefault(); break;
                case 'KeyA': keyState.a = true; e.preventDefault(); break;
                case 'KeyS': keyState.s = true; e.preventDefault(); break;
                case 'KeyD': keyState.d = true; e.preventDefault(); break;
                case 'Space': 
                    if (!isJumping) {
                        keyState.space = true;
                        velocityY = jumpPower;
                        isJumping = true;
                    }
                    e.preventDefault(); 
                    break;
                case 'ShiftLeft':
                case 'ShiftRight':
                    keyState.shift = true;
                    moveSpeed = runSpeed;
                    e.preventDefault();
                    break;
                case 'KeyC':
                    // Ganti mode kamera
                    cameraMode = cameraMode === 'third' ? 'orbit' : 'third';
                    document.getElementById('cam-mode').textContent = 
                        cameraMode === 'third' ? 'Third Person' : 'Orbit';
                    break;
            }
        });
        
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = false; e.preventDefault(); break;
                case 'KeyA': keyState.a = false; e.preventDefault(); break;
                case 'KeyS': keyState.s = false; e.preventDefault(); break;
                case 'KeyD': keyState.d = false; e.preventDefault(); break;
                case 'Space': keyState.space = false; e.preventDefault(); break;
                case 'ShiftLeft':
                case 'ShiftRight':
                    keyState.shift = false;
                    moveSpeed = walkSpeed;
                    e.preventDefault();
                    break;
            }
        });
        
        // Cegah scroll saat tekan spasi
        window.addEventListener('contextmenu', e => e.preventDefault());
        
        // --- MOBILE CONTROLS ---
        document.getElementById('mobile-up').addEventListener('touchstart', (e) => { e.preventDefault(); keyState.w = true; });
        document.getElementById('mobile-up').addEventListener('touchend', (e) => { e.preventDefault(); keyState.w = false; });
        document.getElementById('mobile-down').addEventListener('touchstart', (e) => { e.preventDefault(); keyState.s = true; });
        document.getElementById('mobile-down').addEventListener('touchend', (e) => { e.preventDefault(); keyState.s = false; });
        document.getElementById('mobile-left').addEventListener('touchstart', (e) => { e.preventDefault(); keyState.a = true; });
        document.getElementById('mobile-left').addEventListener('touchend', (e) => { e.preventDefault(); keyState.a = false; });
        document.getElementById('mobile-right').addEventListener('touchstart', (e) => { e.preventDefault(); keyState.d = true; });
        document.getElementById('mobile-right').addEventListener('touchend', (e) => { e.preventDefault(); keyState.d = false; });
        document.getElementById('mobile-jump').addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            if (!isJumping) {
                keyState.space = true;
                velocityY = jumpPower;
                isJumping = true;
            }
        });
        
        // --- FUNGSI UPDATE POSISI KARAKTER ---
        function updateCharacter() {
            // Hitung arah gerak berdasarkan rotasi kamera
            const cameraDirection = new THREE.Vector3();
            camera.getWorldDirection(cameraDirection);
            cameraDirection.y = 0;
            cameraDirection.normalize();
            
            const cameraRight = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), cameraDirection).normalize();
            
            let moveX = 0;
            let moveZ = 0;
            
            if (keyState.w) {
                moveX += cameraDirection.x;
                moveZ += cameraDirection.z;
            }
            if (keyState.s) {
                moveX -= cameraDirection.x;
                moveZ -= cameraDirection.z;
            }
            if (keyState.a) {
                moveX += cameraRight.x;
                moveZ += cameraRight.z;
            }
            if (keyState.d) {
                moveX -= cameraRight.x;
                moveZ -= cameraRight.z;
            }
            
            // Normalisasi untuk gerak diagonal
            if (moveX !== 0 || moveZ !== 0) {
                const length = Math.sqrt(moveX*moveX + moveZ*moveZ);
                moveX = moveX / length * moveSpeed;
                moveZ = moveZ / length * moveSpeed;
                
                // Rotasi karakter menghadap arah gerak
                const angle = Math.atan2(moveX, moveZ);
                character.rotation.y = angle;
            }
            
            // Update posisi karakter
            character.position.x += moveX;
            character.position.z += moveZ;
            
            // Batasi area gerak
            character.position.x = Math.max(-20, Math.min(20, character.position.x));
            character.position.z = Math.max(-20, Math.min(20, character.position.z));
            
            // Fisika lompat
            velocityY -= gravity;
            character.position.y += velocityY;
            
            if (character.position.y <= characterHeight) {
                character.position.y = characterHeight;
                velocityY = 0;
                isJumping = false;
            }
            
            // Update target kamera ke posisi karakter
            controls.target.copy(character.position);
            
            // Update tampilan posisi
            document.getElementById('pos-x').textContent = character.position.x.toFixed(2);
            document.getElementById('pos-y').textContent = character.position.y.toFixed(2);
            document.getElementById('pos-z').textContent = character.position.z.toFixed(2);
            document.getElementById('speed').textContent = moveSpeed === runSpeed ? 'Lari' : 'Jalan';
        }
        
        // --- DETEKSI KOLEKSI OBJEK ---
        function checkCollectibles() {
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const coin = collectibles[i];
                const distance = character.position.distanceTo(coin.position);
                
                if (distance < 1.5) {
                    // Koleksi didapatkan
                    scene.remove(coin);
                    collectibles.splice(i, 1);
                    collectedCount++;
                    
                    // Update UI atau tambah efek
                    console.log(`Collected! Total: ${collectedCount}`);
                    
                    // Buat objek baru untuk menggantikan
                    if (collectibles.length < 5) {
                        setTimeout(() => {
                            const newCoin = coin.clone();
                            newCoin.position.set(
                                (Math.random() - 0.5) * 25,
                                0.5,
                                (Math.random() - 0.5) * 25
                            );
                            scene.add(newCoin);
                            collectibles.push(newCoin);
                        }, 3000);
                    }
                }
            }
        }
        
        // --- ANIMASI LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Update karakter
            updateCharacter();
            
            // Cek koleksi
            checkCollectibles();
            
            // Animasi objek koleksi (berputar dan mengapung)
            collectibles.forEach(coin => {
                coin.rotation.y += 0.02;
                coin.position.y = 0.5 + Math.sin(Date.now() * coin.userData.floatSpeed + coin.userData.floatOffset) * 0.2;
            });
            
            // Update controls
            controls.update();
            
            // Render
            renderer.render(scene, camera);
        }
        
        animate();
        
        // --- RESIZE HANDLER ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // --- INSTRUKSI KLIK UNTUK FOKUS ---
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        console.log('Game siap! Gunakan WASD untuk bergerak, Space untuk lompat');
    </script>
</body>
</html>
